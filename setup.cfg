[flake8]
max-line-length = 88
extend-ignore = E203,E501,W503,W504
exclude = 
    .git,
    __pycache__,
    .venv,
    venv,
    build,
    dist,
    *.egg-info,
    .pytest_cache,
    .mypy_cache,
    tests
per-file-ignores =
    __init__.py:F401
max-complexity = 15
select = E,W,F,C
